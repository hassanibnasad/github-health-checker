services:
  - type: web
    name: github-vitals-monitor
    env: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

